<!doctype html>
<html>
  <head>
    <title>Create Post</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
      }

      .container {
        width: 50%;
        margin: 50px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      button {
        background: #2b78e4;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Create New Post</h2>

      <form method="POST">
        {% csrf_token %} {{ form.as_p }}

        <button type="submit">Submit Post</button>
      </form>

      <br />

      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
